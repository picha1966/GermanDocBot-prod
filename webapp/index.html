<!DOCTYPE html>

<html lang="uk">

<head>
  <meta charset="UTF-8" />
  <!-- No redirect needed — FastAPI serves this file on /, /form, /index.html -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Deutschland PDF • WebApp</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --card2:#fafafa;
      --text:#1a1a1a;
      --muted:#666666;
      --hint:#888888;
      --line:#e0e0e0;
      --primary:#4a90e2;
      --primary2:#357abd;
      --danger:#d32f2f;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
      --radius:8px;
      --radius2:6px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
      background: var(--bg);
      color: var(--text);
      padding:16px 16px 98px;
      min-height:100vh;
      line-height:1.55;
    }
    .h2{color:var(--muted)}
    body[dir="rtl"]{text-align:right}
    .wrap{max-width:720px;margin:0 auto}
    .top{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      padding:18px 18px 16px;
      margin-bottom:16px;
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .titleRow{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:1}
    .tLeft{min-width:0}
    .h1{font-size:20px;font-weight:800;letter-spacing:.2px}
    .h2{font-size:13px;color:var(--hint);margin-top:4px}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 10px;border-radius:999px;
      border:1px solid var(--line);
      background: var(--card2);
      color: var(--muted);
      font-size:12px;
      white-space:nowrap;
    }
    .pill b{color:var(--primary)}
    .flowHint{
      font-size:12px;color:var(--muted);margin-top:10px;padding:8px 0;
      border-top:1px dashed var(--line);
    }
    .stepPill{
      font-size:11px;color:var(--primary);font-weight:600;margin-top:4px;
    }
    .disclaimerBlock{
      font-size:11px;color:var(--hint);padding:8px 0 12px;border-bottom:1px solid var(--line);margin-bottom:8px;
    }
    .langRow{
      display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;position:relative;z-index:1
    }
    .chip{
      display:inline-flex;align-items:center;gap:8px;
      padding:9px 10px;border-radius:999px;
      border:1px solid var(--line);
      background: var(--card2);
      color: var(--text);
      font-size:12px;
      cursor:pointer;
      user-select:none;
      transition:.15s;
    }
    .chip:hover{border-color:var(--primary)}
    .chip.active{
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(74,144,226,.1);
      color: #fff;
      background: var(--primary);
    }

    .grid{display:grid;gap:14px}
    #main.grid{gap:18px}

    .card{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      padding:16px;
      box-shadow: var(--shadow);
    }

    .secHead{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding-bottom:10px;margin-bottom:14px;
      border-bottom:1px solid var(--line);
    }
    .secName{
      display:flex;align-items:center;gap:10px;
      font-weight:700;
      letter-spacing:.1px;
      color: var(--text);
    }
    .ico{
      width:34px;height:34px;border-radius:8px;
      display:inline-flex;align-items:center;justify-content:center;
      background: var(--card2);
      border:1px solid var(--line);
      color: var(--primary);
      font-size:16px;
      flex:0 0 auto;
    }

    .fields{display:grid;gap:12px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:560px){.row2{grid-template-columns:1fr}}

    .fg{display:grid;gap:6px}
    .lbl{
      font-size:12px;
      color: var(--muted);
      display:flex;align-items:center;gap:8px;
    }
    .reqDot{
      width:7px;height:7px;border-radius:999px;background: var(--danger);display:inline-block
    }
    /* ── Collapsible sections & optional UX (wohngeld dynamic form) ── */
    .optional-badge{
      font-size:11px;color:var(--muted);margin-left:8px;
      background:rgba(0,0,0,0.05);border-radius:4px;padding:1px 6px;
      font-weight:400;letter-spacing:.01em;flex-shrink:0;
    }
    .optional-label{
      font-size:11px;color:var(--muted);margin-left:6px;
      opacity:.8;font-weight:400;flex-shrink:0;
    }
    .secHead.collapsible{cursor:pointer;user-select:none}
    .secHead.collapsible:active{opacity:.8}
    .collapseArrow{
      margin-left:auto;font-size:13px;color:var(--muted);
      transition:transform .2s ease;display:inline-block;flex-shrink:0;
    }
    .collapseArrow.open{transform:rotate(180deg)}
    .section-body-wrap.collapsed{display:none}

    /* ── Yes / No toggle (yesno field type) ── */
    .yn-toggle{display:flex;gap:8px;margin-top:4px}
    .yn-btn{
      flex:1;padding:11px 8px;border:1.5px solid var(--line);border-radius:var(--radius2);
      background:#f5f5f7;color:var(--text);font-size:14px;font-weight:500;
      cursor:pointer;transition:background .15s,border-color .15s,color .15s;
      line-height:1.2;text-align:center;
    }
    .yn-btn:hover:not(.yn-active){background:#e8e8ec}
    .yn-btn.yn-ja.yn-active{background:#d4edda;border-color:#28a745;color:#155724;font-weight:700}
    .yn-btn.yn-nein.yn-active{background:#f8d7da;border-color:#dc3545;color:#721c24;font-weight:700}
    /* Child add / remove toggle strip */
    .at-child-toggle{
      display:flex;align-items:center;gap:10px;
      margin:8px 0 4px;padding:10px 14px;
      border-radius:var(--radius2);border:1px dashed var(--line);
      background:#f9f9fb;cursor:pointer;font-size:14px;color:var(--text);
      user-select:none;
    }
    .at-child-toggle .ct-ico{font-size:16px}
    .at-child-toggle.ct-open{border-color:var(--primary);background:#eef4ff;color:var(--primary)}
    .at-child-block{margin-top:4px}

    .in{
      width:100%;
      padding:12px 14px;
      border-radius: var(--radius2);
      border:1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size:15px;
      transition:.15s;
    }
    .in:focus{
      outline:none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(74,144,226,.08);
    }
    /* Валідне поле — зелена рамка */
    .in.valid, .in.in_valid{
      border: 2px solid #2e7d32;
      box-shadow: 0 0 0 2px rgba(46,125,50,.08);
    }
    /* Помилка — червона рамка */
    .in.error, .in.in_error{
      border: 2px solid #e53935;
      background: #fff6f6;
      box-shadow: 0 0 0 2px rgba(229,57,53,.08);
    }
    /* Текст помилки під полем (локалізований) */
    .err{
      display:none;
      font-size:12px;
      color: #e53935;
      padding-left:2px;
      margin-top:3px;
    }
    .err.show{
      display:block;
      font-size:13px;
      margin-top:4px;
    }
    .err.show ~ .condReqHint{display:none !important}
    .err.warning{color:#b45309}
    /* field-error: alias for .err (backend validation messages) */
    .field-error{
      display:block;
      font-size:13px;
      color: #e53935;
      padding-left:2px;
      margin-top:4px;
    }
    /* Global validation error banner (shown after backend rejection) */
    .validation-error-banner{
      display:none;
      background: #fff6f6;
      border: 1.5px solid #e53935;
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 14px;
      color: #c62828;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.6;
      white-space: pre-line;
      box-shadow: 0 1px 4px rgba(229,57,53,.10);
    }
    .validation-error-banner.show{display:block}
    .validation-error-banner .veb-icon{
      margin-right: 6px;
      font-style: normal;
    }

    select.in{cursor:pointer}
    .help{
      color:var(--muted);
      font-size:12px;
      margin-top:6px;
    }

    .bar{
      position:fixed;left:0;right:0;bottom:0;
      padding:14px 14px calc(14px + env(safe-area-inset-bottom, 0px));
      background: rgba(255,255,255,.98);
      border-top:1px solid var(--line);
      backdrop-filter: blur(10px);
      display:flex;gap:12px;
      z-index:999;
    }
    .btn{
      flex:1;
      padding:16px 14px;
      border-radius: 14px;
      border:1px solid rgba(43,255,154,.22);
      font-weight:900;
      letter-spacing:.2px;
      font-size:15px;
      cursor:pointer;
      transition:.12s;
    }
    .btnPrimary{
      background: var(--primary);
      color:#fff;
      border:none;
    }
    .btnPrimary:active{transform: translateY(1px)}
    .btnPrimary:disabled{
      background: var(--card2);
      color: var(--muted);
      border:1px solid var(--line);
      cursor: not-allowed;
      pointer-events: none;
    }
    .btnGhost{
      background:var(--card2);
      color: var(--primary);
      border:1px solid var(--line);
    }
    .btnGhost:active{transform: translateY(1px)}
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
      transform:none;
    }
    /* Visual-only disabled state — button stays clickable so scroll-to-error works */
    .btn-soft-disabled{
      background: var(--card2) !important;
      color: var(--muted) !important;
      border:1px solid var(--line) !important;
      opacity:.7;
    }

    .reviewWrap{display:none}
    .reviewWrap.active{display:block}

    .previewSection{
      margin-top: 16px;
      margin-bottom: 16px;
    }
    .previewSection .card{
      background: var(--card2);
      border: 1px solid var(--line);
    }
    .previewSection .previewEmpty{
      color: var(--muted);
      font-size: 13px;
      padding: 12px 0;
      text-align: center;
    }
    .previewSection .previewItem{
      padding: 8px 0;
      border-bottom: 1px dashed var(--line);
    }
    .previewSection .previewItem:last-child{
      border-bottom: none;
    }
    .previewSection .previewLabel{
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .previewSection .previewValue{
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }
    .previewSection .previewGroup{
      margin-bottom: 16px;
    }
    .previewSection .previewGroup:last-child{
      margin-bottom: 0;
    }
    .previewSection .previewGroupTitle{
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .kv{
      display:flex;justify-content:space-between;gap:12px;
      padding:10px 0;
      border-bottom:1px dashed var(--line);
    }
    .k{color:var(--muted);font-weight:700;font-size:12px}
    .v{color:#fff;font-size:13px;text-align:right;max-width:62%;word-break:break-word}
    body[dir="rtl"] .v{text-align:left}

    .miniRow{display:flex;gap:10px;flex-wrap:wrap}
    .miniBtn{
      padding:10px 12px;
      border-radius: 999px;
      border:1px solid var(--line);
      background:var(--card2);
      color: var(--primary);
      font-weight:600;
      font-size:12px;
      cursor:pointer;
    }

    .toast{
      position:fixed;left:50%;bottom:110px;transform:translateX(-50%);
      background: var(--card);
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius: 999px;
      color:var(--text);
      font-size:12px;
      box-shadow: var(--shadow);
      display:none;
      z-index:1000;
      max-width:92vw;
      text-align:center;
    }
    .toast.show{display:block}

    .ok{display:none}
    .ok.active{
      display:block;
      text-align:center;
      padding:34px 18px;
    }
    .ok .big{font-size:56px}
    .ok h2{margin-top:12px;font-size:22px;font-weight:700;color:var(--primary)}
    .ok p{margin-top:8px;color:var(--muted);font-size:13px}

    .fadeIn{animation:fade .18s ease-out}
    @keyframes fade{from{opacity:.3;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top fadeIn">
      <div class="titleRow">
        <div class="tLeft">
          <div class="h1" id="ui_title">Form</div>
          <div class="h2" id="ui_subtitle">Please enter data</div>
        </div>
        <div class="pill" id="pillDoc">doc: <b id="pillDocVal">—</b></div>
      </div>
      <div class="flowHint" id="flowHint"></div>
      <div class="stepPill" id="stepPill"></div>
      <div class="langRow" id="langRow"></div>
    </div>
    <div class="disclaimerBlock" id="disclaimerBlock"></div>

    <div id="validationBanner" class="validation-error-banner" role="alert" aria-live="polite"></div>

    <div id="main" class="grid"></div>

    <div id="preview" class="previewSection" style="display:none;"></div>

    <div id="ok" class="ok">
      <div class="big">✅</div>
      <h2 id="okTitle">Done</h2>
      <p id="okText">Data sent to Telegram</p>
      <button type="button" id="btnCloseWebapp" class="btn btnPrimary" style="margin-top:16px;display:none;">Close</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div id="missingFieldsAlert" class="card" style="display:none; margin:0 12px 12px; padding:12px; background:rgba(220,53,69,0.08); border:1px solid rgba(220,53,69,0.3); border-radius:8px;">
    <div style="font-weight:600; margin-bottom:8px; color:#c82333;" id="missingFieldsTitle"></div>
    <ul id="missingFieldsList" style="margin:0; padding-left:20px; color:#721c24;"></ul>
  </div>
  <div id="debugSend" style="display:none; margin-top:8px; padding:8px; font-size:12px; border-radius:8px; background:#f0f0f0; color:#1a1a1a;"></div>

  <div class="bar" id="barForm">
    <button class="btn btnPrimary" id="btnSubmit" type="button"></button>
  </div>

<script>
(function(){
  'use strict';

  /* ===================== TELEGRAM ===================== */
  // CRITICAL DEBUG: Check if Telegram.WebApp exists at the TOP
  console.log("Telegram.WebApp =", window.Telegram && window.Telegram.WebApp);
  console.log("initData =", window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData);
  if (!(window.Telegram && window.Telegram.WebApp)) {
    console.error("HARD ERROR: Telegram.WebApp is undefined! WebApp is NOT opened as Telegram WebApp!");
  }
  if (!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
    console.error("HARD ERROR: Telegram.WebApp.initData is undefined! WebApp is NOT opened via Telegram WebApp button!");
  }
  
  let tg = (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;

  function initTelegramWebApp() {
    if (typeof window === 'undefined') return;
    tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : tg;
    if (tg) {
      tg.ready();
      tg.enableClosingConfirmation();
      tg.expand();
    }
  }
  initTelegramWebApp();
  if (typeof document !== 'undefined' && document.readyState !== 'complete') {
    window.addEventListener('DOMContentLoaded', initTelegramWebApp);
  }

  /* ===================== CONST ===================== */

  const SECTION_META = {

    haushalt:              { icon: '👨‍👩‍👧' },
    einkommen:             { icon: '💶' },

  };

  const SECTION_ORDER = ['personal','address','land','landlord','child','other'];
  /** Порядок секцій для форми з API (formSchema з section) */
  const SCHEMA_SECTION_ORDER = ['personal','address','dates','optional','land','other'];

  /* ===================== TRANSLATIONS ===================== */
  const T = {

      coming_soon: 'Анкета для цього документа скоро буде доступна',

      step_draft: 'Крок 2: Чернетка',
      step_check: 'Крок 3: Перевірка',

  /**

   * DE: show raw German value. All other languages: show only the localized label.
   * option.value is always the raw German value — backend receives German regardless.
   */
  function _localizeOptionLabel(rawValue, currentLang) {
    if (!rawValue) return rawValue;
    var entry = _OPTION_LABELS[rawValue];
    if (!entry) return rawValue;
    // For DE: use the de entry if available (avoids showing lowercase raw values like "ja"),
    // otherwise fall back to rawValue to preserve existing German label behavior.
    if (currentLang === 'de') return entry.de || rawValue;
    var localized = entry[currentLang] || entry['uk'] || '';
    if (!localized) return rawValue;
    return localized;
  }

  function mergeLang(base, lang){

    out.sections = { ...(b.sections||{}), ...(x.sections||{}) };
    out.labels = { ...(b.labels||{}), ...(x.labels||{}) };
    out.placeholders = { ...(b.placeholders||{}), ...(x.placeholders||{}) };
    out.hints = { ...(b.hints||{}), ...(x.hints||{}) };
    
    // CRITICAL FIX: If labels are empty, log error but don't fallback silently
    if (!out.labels || Object.keys(out.labels).length === 0) {
      console.error(`[LANG ERROR] No labels found for language: ${lang}`);
    }
    
    return out;
  }

      if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
      var data = await r.json();
      if (!data || !Array.isArray(data.sections)) throw new Error('Invalid schema: missing sections array');

  /** Плоский список полів з doc_schema (єдине джерело правди). Renderer не має жорстко заданих полів. */
  function getFlatFieldsFromSchema() {
    if (!formSchema || !formSchema.sections || !formSchema.sections.length) return [];
    var out = [];
    for (var i = 0; i < formSchema.sections.length; i++) {
      var sec = formSchema.sections[i];
      var arr = sec.fields || [];
      for (var j = 0; j < arr.length; j++) {
        var f = arr[j];
        out.push({
          key: f.name,
          label: f['label_' + lang] || f.label_en || f.label_de,
          type: f.type || 'text',
          required: !!f.required,
          section: sec.id,
          placeholder: f.placeholder,
          hint_key: f.hint_key != null ? f.hint_key : f.name
        });
      }
    }
    return out;
  }

  /** True if the field is actually shown: any ancestor with display:none (incl. section cards with data-sec-vis-field) hides it. */
  function isFieldVisible(inp) {
    if (!inp) return true;
    var el = inp;
    while (el) {
      try {
        if (window.getComputedStyle(el).display === 'none') return false;
      } catch (e) { /* detached */ }
      if (el === document.documentElement) break;
      el = el.parentElement;
    }
    return true;
  }

  function isHiddenOnlyByCollapsedSection(inp) {

      if (el.classList &&
          el.classList.contains('section-body-wrap') &&
          el.classList.contains('collapsed')) {
        return true;
      }
      el = el.parentElement;
    }
    return false;
  }

  function getRequiredFields(){
    var flat = (formSchema && formSchema.sections) ? getFlatFieldsFromSchema() : [];
    if (flat.length) {
      return new Set(flat.filter(function(f){ return f.required; }).map(function(f){ return f.key; }));
    }
    const requiredFields = new Set();
    (docCfg.fields || []).forEach(f => {
      if (f.required) requiredFields.add(f.key);
    });
    if (docCfg.child && docCfg.childSchema) {
      for (let i = 1; i <= childCount; i++) {
        docCfg.childSchema.forEach(baseField => {
          if (baseField.required) {
            const actualKey = `child_${i}_${baseField.key.split('child_').pop()}`;
            requiredFields.add(actualKey);
          }
        });
      }
    }
    return requiredFields;
  }

    var _backendAssembled = new Set([

  function validateField(inp, showError = true){
    // Validate a single field and optionally show error
    const k = inp.dataset.key;
    const type = inp.dataset.type;
    const required = inp.dataset.required === '1';
    const val = (type === 'checkbox') ? (inp.checked ? 'Ja' : '')
              : (type === 'yesno')   ? (inp.dataset.ynval || '').trim()
              : (inp.value || '').trim();

    // yesno: optional toggles validate as-is; required yesno (e.g. confirmations) must be "ja"
    if (type === 'yesno') {
      var _yn = (inp.dataset.ynval || '').trim();
      if (inp.dataset.required === '1' && _yn !== 'ja') {
        return setErr(t.err_required);
      }
      inp.classList.remove('error');
      inp.classList.add('valid');
      return true;
    }
    
    const err = inp.parentElement.querySelector('.err');
    
    function setErr(msg){
      if (showError) {
        inp.classList.add('error');
        inp.classList.remove('valid');
        if (err) {
          err.textContent = msg;
          err.classList.add('show');
        }
      }
      return false;
    }
    
    function clearErr(){
      inp.classList.remove('error');
      if (err) {
        err.textContent = '';
        err.classList.remove('show');
      }
      // For yesno divs, .value is undefined — read ynval from dataset instead
      var _cv = (type === 'yesno') ? (inp.dataset.ynval || '').trim() : (inp.value || '').trim();
      if (_cv) inp.classList.add('valid'); else inp.classList.remove('valid');
      return true;
    }
    
    // Forbidden placeholders (never pass)
    if (val && typeof isForbiddenPlaceholder === 'function' && isForbiddenPlaceholder(val)){
      return setErr(t.err_placeholder || t.value_invalid);
    }

    // Email is always optional: empty = valid regardless of dataset.required.
    // Only validate format when the field is actually filled.
    if (type === 'email') {
      if (!val) return clearErr();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
        return setErr(t.err_email || '❌ Enter a valid email (e.g. name@gmail.com)');
      }
      return clearErr();
    }

    // Required field validation
    if (required && !val){
      // Specific localized message for conditionally-required marriage field
      if (k === 'eheschliessung_ort_datum') {
        var _cl = (typeof lang !== 'undefined') ? lang : 'uk';
        if (_cl === 'ua') _cl = 'uk';
        return setErr(_COND_REQ_HINT[_cl] || _COND_REQ_HINT.en);
      }
      return setErr(t.err_required);
    }
    
    // Value format validation (only if field has value)
    if (val) {
      // Phone: allow leading + and digits; validate after stripping + and spaces
      if (k === 'phone') {
        var _pn = val.replace(/^\+/, '').replace(/[\s\-]/g, '');
        if (!/^\d{7,15}$/.test(_pn))
          return setErr(t.err_phone || 'Example: 493012345678 (without +)');
      } else if (type !== 'date' && type !== 'plz' && type !== 'select' && type !== 'land' && type !== 'house_number' && type !== 'email' && type !== 'number' && !isLatinOnly(val)){
        return setErr(t.err_latin);
      }
      if (type === 'plz') {
        if (!isPlz(val)) return setErr(t.err_plz);
        if (typeof isGermanPlzRange === 'function' && !isGermanPlzRange(val)) return setErr(t.err_plz_germany || t.err_plz);
      }
      if (k === 'eheschliessung_ort_datum') {
        var _mparse = parseMarriagePlaceDate(val);
        console.log('VALUE:', val);
        console.log('VALID:', _mparse.valid);
        console.log('BLOCK REASON:', _mparse.reason || 'none');
        if (!_mparse.valid) {
          return setErr((_mparse.reason === 'city_empty') ? (t.err_value_invalid || t.err_fix) : (t.err_date || t.err_fix));
        }
      }
      if (type === 'date') {
        if (!isValidDate(val)) return setErr(t.err_date);
        if ((k === 'birth_date' || k === 'move_in_date' || k === 'partner_birth_date' || k === 'child_birth_date') &&
            typeof isDateNotFuture === 'function' && !isDateNotFuture(val))
          return setErr(t.err_date_future || t.err_date);
      }
      if ((k === 'first_name' || k === 'last_name') && typeof isNameValid === 'function' && !isNameValid(val))
        return setErr(t.err_name_letters || t.err_latin);
      if (type === 'street' && /\d/.test(val))
        return setErr(t.err_street_digits || t.err_street_no_digits || t.err_latin);
      if (type === 'house_number' && !/^\d+[A-Za-z0-9\s\-\/\.]*$/.test(val))
        return setErr(t.err_house_number || t.err_value_invalid || t.err_fix);
      if (type === 'city' && /\d/.test(val))
        return setErr(t.err_city_digits || t.err_value_invalid || t.err_latin);
      // birth_place fields require both city and country (at least 2 tokens)
      if (k === 'birth_place' || k === 'person2_birth_place') {
        var _bp = val.trim();
        var _bpValid = _bp.indexOf(',') !== -1
          ? _bp.split(',').filter(function(s){ return s.trim().length > 0; }).length >= 2
          : _bp.split(/\s+/).filter(function(s){ return s.length > 0; }).length >= 2;
        if (!_bpValid)
          return setErr(t.err_birth_place_incomplete || 'Enter city and country, e.g.: Vinnytsia Ukraine');
      }

  function getFirstInvalidField(){

  // STRICT: block Cyrillic and any non-latin letters; allow digits, space, dot, dash, apostrophe

  // German umlauts (ÄÖÜäöüß) plus full Latin-1 Supplement letter range.
  const LATIN_RE = /^[A-Za-zÀ-ÖØ-öø-ÿ0-9 .,'\-\/&]*$/;

  function isLatinOnly(val){

  /**
   * IBAN validation — structural + MOD-97 checksum.
   * Accepts raw input with or without spaces (e.g. "DE89 3704 0044 0532 0130 00").
   * Returns true only when the IBAN is structurally valid AND passes MOD-97.
   * Non-DE IBANs are accepted if they pass the general structure + MOD-97 check.
   */
  function isValidIBAN(raw) {
    if (!raw) return false;
    // Strip spaces and convert to upper-case
    var iban = String(raw).replace(/\s+/g, '').toUpperCase();
    // Basic structure: 2 letters + 2 digits + 1–30 alphanumeric chars
    if (!/^[A-Z]{2}\d{2}[A-Z0-9]{1,30}$/.test(iban)) return false;
    // Country-specific length check (DE = 22 chars)
    var CC_LENGTHS = { DE: 22, AT: 20, CH: 21, NL: 18, FR: 27, PL: 28, GB: 22 };
    var cc = iban.substring(0, 2);
    if (CC_LENGTHS[cc] && iban.length !== CC_LENGTHS[cc]) return false;
    // MOD-97: move first 4 chars to end, convert letters → digits (A=10…Z=35), check mod 97 === 1
    var rearranged = iban.substring(4) + iban.substring(0, 4);
    var numStr = '';
    for (var i = 0; i < rearranged.length; i++) {
      var c = rearranged.charCodeAt(i);
      numStr += (c >= 65 && c <= 90) ? String(c - 55) : rearranged[i];
    }
    // Process in 9-digit chunks to avoid BigInt overflow in plain JS
    var remainder = 0;
    for (var j = 0; j < numStr.length; j += 9) {
      remainder = parseInt(String(remainder) + numStr.substring(j, j + 9), 10) % 97;
    }
    return remainder === 1;
  }

  // Berlin PLZ ranges (must match backend form_validation.py)
  var BERLIN_PLZ_RANGES = [[10115,10999],[12043,12359],[12435,12689],[13051,13189],[13347,13629],[14050,14199]];
  function isBerlinPlz(plz){
    if (!plz) return false;
    var s = String(plz).replace(/\D/g,'');
    if (s.length !== 5) return false;
    var n = parseInt(s, 10);
    if (isNaN(n)) return false;
    for (var i = 0; i < BERLIN_PLZ_RANGES.length; i++) {

  function cityLooksBerlin(city){

  function isValidDate(val){
    if (!val) return true;
    // Support DD.MM.YYYY format
    const ddmmyyyy = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(val);
    if (ddmmyyyy) {
      const day = parseInt(ddmmyyyy[1], 10);
      const month = parseInt(ddmmyyyy[2], 10);
      const year = parseInt(ddmmyyyy[3], 10);
      // Create date in YYYY-MM-DD format for validation
      const date = new Date(year, month - 1, day);
      // Check if date is valid and matches input
      return date.getFullYear() === year &&
             date.getMonth() === month - 1 &&
             date.getDate() === day &&
             day >= 1 && day <= 31 &&
             month >= 1 && month <= 12 &&
             year >= 1900 && year <= 2100;
    }
    // Fallback to standard Date parsing
    const d = new Date(val);
    return !isNaN(d.getTime());

  function parseMarriagePlaceDate(val){
    if (!val) return { valid: false, reason: 'empty', city: '', date: '' };
    var s = String(val).trim();
    var m = /^\s*(.+?)\s*,?\s*(\d{2}\.\d{2}\.\d{4})\s*$/.exec(s);
    if (!m) return { valid: false, reason: 'date_format', city: '', date: '' };
    var city = (m[1] || '').trim();

    if (!city) return { valid: false, reason: 'city_empty', city: '', date: date };
    if (!isValidDate(date)) return { valid: false, reason: 'date_invalid', city: city, date: date };
    return { valid: true, reason: '', city: city, date: date };
  }

  function parseDdMmYyyy(val){

    var m = /^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/.exec(String(val).trim());
    if (!m) return null;
    var d = parseInt(m[1],10), mo = parseInt(m[2],10), y = parseInt(m[3],10);

  function dateCompare(a, b){
    if (!a || !b) return 0;
    if (a.y !== b.y) return a.y < b.y ? -1 : 1;
    if (a.m !== b.m) return a.m < b.m ? -1 : 1;
    if (a.d !== b.d) return a.d < b.d ? -1 : 1;

  function validateDocumentNumber(docType, num){
    if (!num) return false;
    var s = String(num).trim().replace(/\s/g,'').replace(/-/g,'');

    if (doc === 'RP') {

  /** Form-level validation errors (cross-field). Returns [{field, messageKey}] for hard block. */
  function getFormLevelErrors(){
    var fd = formData || {};
    var errors = [];

    // Helper: read live DOM value first, fall back to formData if input not in Map
    function _live(key) {
      var inp = inputs.get(key);
      return inp ? (inp.value || '').trim() : (fd[key] || '').trim();
    }

    var plz  = _live('postal_code') || _live('plz');
    var city = _live('city');
    if (plz && typeof isGermanPlzRange === 'function' && !isGermanPlzRange(plz))
      errors.push({ field: 'postal_code', messageKey: 'err_plz_germany' });
    if (city && cityLooksBerlin(city) && plz) {
      var digits = plz.replace(/\D/g,'');
      if (digits.length === 5 && !isBerlinPlz(plz)) errors.push({ field: 'postal_code', messageKey: 'err_plz_berlin' });
    }
    if (plz && plz.replace(/\D/g,'').length === 5 && isBerlinPlz(plz) && city && !cityLooksBerlin(city))
      errors.push({ field: 'city', messageKey: 'err_plz_city_mismatch' });
    var docArt = _live('dokumentenart');
    var serien  = _live('seriennummer');
    if (docArt && serien && !validateDocumentNumber(docArt, serien)) {
      errors.push({ field: 'seriennummer', messageKey: 'err_document_number' });
    }
    var auth = _live('ausstellungsbehoerde');
    var docNeedsAuthority =
        docType === 'aufenthaltstitel' ||
        docType === 'reisepass' ||
        docType === 'personalausweis';
    if (docNeedsAuthority && !auth) errors.push({ field: 'ausstellungsbehoerde', messageKey: 'err_authority_empty' });
    var issueStr  = _live('ausstellungsdatum');
    var expiryStr = _live('gueltig_bis');
    var birthStr  = _live('birth_date');
    var issueD  = issueStr  ? parseDdMmYyyy(issueStr)  : null;
    var expiryD = expiryStr ? parseDdMmYyyy(expiryStr) : null;
    var birthD  = birthStr  ? parseDdMmYyyy(birthStr)  : null;
    var today = new Date();
    var todayY = today.getFullYear(), todayM = today.getMonth() + 1, todayD = today.getDate();
    var todayT = { d: todayD, m: todayM, y: todayY };
    var moveInStr = _live('move_in_date');
    var move_inD  = moveInStr ? parseDdMmYyyy(moveInStr) : null;

    if (issueD && dateCompare(issueD, todayT) > 0) errors.push({ field: 'ausstellungsdatum', messageKey: 'err_date_future' });
    if (move_inD && dateCompare(move_inD, todayT) > 0) errors.push({ field: 'move_in_date', messageKey: 'err_date_future' });
    if (birthD && dateCompare(birthD, todayT) > 0) errors.push({ field: 'birth_date', messageKey: 'err_date_future' });
    if (issueD && expiryD && dateCompare(expiryD, issueD) < 0) errors.push({ field: 'gueltig_bis', messageKey: 'err_date_logic' });
    if (issueD && birthD && dateCompare(birthD, issueD) >= 0) errors.push({ field: 'birth_date', messageKey: 'err_date_logic' });
    if (move_inD && birthD && dateCompare(birthD, move_inD) >= 0) errors.push({ field: 'birth_date', messageKey: 'err_date_logic' });
    return errors;
  }

  /** Один form renderer: читає doc_schema, будує форму. Тільки поля зі schema, без універсальної анкети. */
  function rebuildFromSchema(){
    console.log('[rebuildFromSchema] start | formSchema sections:', formSchema ? formSchema.sections.length : 'null');
    elMain.innerHTML = '';
    inputs.clear();
    elTitle.textContent = t.title;
    elSubtitle.textContent = t.subtitle;
    pillDocVal.textContent = docType;
    renderLangRow();
    if (barForm) barForm.style.display = 'flex';
    if (!formSchema || !formSchema.sections || !formSchema.sections.length) return;
    var sections = formSchema.sections;
    // Localized "Optional" text for section and field badges
    var _OPTIONAL_TEXT = {
      de: 'Optional', en: 'Optional', uk: 'Необов\u02bcязково',
      pl: 'Opcjonalnie', tr: '\u0130ste\u011fe ba\u011fl\u0131', ar: '\u0627\u062e\u062a\u064a\u0627\u0631\u064a'
    };
    // Localized labels for "Add person" / "Remove" buttons
    var _ADD_PERSON_LABEL = {
      uk: '+ Додати ще особу', de: '+ Person hinzufügen',
      en: '+ Add another person', pl: '+ Dodaj kolejną osobę',
      tr: '+ Başka kişi ekle', ar: '+ إضافة شخص آخر'
    };
    var _PERSON_SECTION_IDS = ['person_2','person_3','person_4','person_5'];
    // Map section id → minimum people_count needed to show it
    var _PERSON_MIN_COUNT = { person_2: 2, person_3: 3, person_4: 4, person_5: 5 };

    // Build per-lang label/hint lookup from the API schema response.
    // This enables translations[lang]?.fields?.[key] pattern for all 6 languages.
    var translations = {};
    ['de','en','uk','pl','tr','ar'].forEach(function(lg) {
      var fmap = {};
      sections.forEach(function(sec) {
        (sec.fields || []).forEach(function(f) {
          fmap[f.key || f.name] = {
            label: f['label_' + lg] || f.label_en || f.label_de || f.name,
            hint:  f['hint_'  + lg] || ''
          };
        });
      });
      translations[lg] = { fields: fmap };
    });
    console.log("LANG:", lang);
    console.log("FIELD SAMPLE:", translations[lang] && translations[lang].fields);

    for (var s = 0; s < sections.length; s++) {
      var sec = sections[s];
      var fieldList = sec.fields || [];
      if (!fieldList.length) continue;

      // Anmeldung: person_2 card visibility is driven by spouse_registers, NOT by people_count.
      // All other person_2–5 cards (ummeldung, etc.) keep the people_count path unchanged.
      if (docType === 'anmeldung' && sec.id === 'person_2') {
        card.dataset.spouseSection = 'Ja';
        card.style.display = 'none'; // hidden by default; shown by applyVisibleIf when spouse_registers=="Ja"
      } else if (_PERSON_MIN_COUNT[sec.id] !== undefined) {
        // Attach data-person-section for person_2–5 so applyVisibleIf can hide/show whole card
        card.dataset.personSection = String(_PERSON_MIN_COUNT[sec.id]);
        card.style.display = 'none'; // hidden by default; applyVisibleIf will show if needed
      }
      // Section-level visibility (wohngeld / dynamic schema sections with section_visible_if).
      // When set, the ENTIRE section card is hidden until the gate field becomes "ja".
      // This prevents confusingly empty collapsible cards appearing to the user.
      if (sec.section_visible_if && sec.section_visible_if.field) {
        card.dataset.secVisField = sec.section_visible_if.field;
        if (sec.section_visible_if.values && sec.section_visible_if.values.length) {
          card.dataset.secVisValues = JSON.stringify(sec.section_visible_if.values);
        } else {
          card.dataset.secVisValue = sec.section_visible_if.value || 'ja';
        }
        // Initial state: hide if gate field doesn't match the required value(s)
        var _initGate = (formData[sec.section_visible_if.field] || '').trim();
        var _initShow = false;
        if (sec.section_visible_if.values && sec.section_visible_if.values.length) {
          _initShow = sec.section_visible_if.values.indexOf(_initGate) !== -1;
        } else {
          _initShow = (_initGate === (sec.section_visible_if.value || 'ja'));
        }
        card.style.display = _initShow ? '' : 'none';
      }

      // UX: collapsible and optional flags (set by wohngeld dynamic schema; absent = false for other docs)
      var _isCollapsible = !!sec.collapsible;
      var _isOptionalSec = !!sec.optional;
      // A section having sec.collapsible defined means it's a new-style schema → show optional field labels
      var _isNewSchema   = (sec.collapsible !== undefined);

      var head = mk('div', _isCollapsible ? 'secHead collapsible' : 'secHead');
      var name = mk('div','secName');
      name.appendChild(mk('div','ico', secIcon(sec.id)));

      card.appendChild(head);

      var _fieldsClass = _isCollapsible ? 'fields section-body-wrap' : 'fields'; // Start expanded
      var fieldsWrap = mk('div', _fieldsClass);
      for (var i = 0; i < fieldList.length; i++) {
        var f = fieldList[i];
        var _fOptional = _isNewSchema && !f.required;
        var _tf = (translations[lang] && translations[lang].fields && translations[lang].fields[f.key || f.name]) || {};
        var norm = {
          key: f.name,
          label: _tf.label || f['label_' + lang] || f.label_en || f.label_de,
          hint: _tf.hint || '',
          type: f.type || 'text',
          required: !!f.required,
          optional: _fOptional,
          optional_label: _fOptional ? (_OPTIONAL_TEXT[lang] || _OPTIONAL_TEXT.de) : null,
          default: f.default,
          placeholder: f.placeholder,
          placeholder_de: f.placeholder_de,
          placeholder_en: f.placeholder_en,
          placeholder_uk: f.placeholder_uk,
          placeholder_pl: f.placeholder_pl,
          placeholder_tr: f.placeholder_tr,
          placeholder_ar: f.placeholder_ar,
          description_de: f.description_de,
          description_en: f.description_en,
          description_uk: f.description_uk,
          description_pl: f.description_pl,
          description_tr: f.description_tr,
          description_ar: f.description_ar,
          hint_key: f.hint_key != null ? f.hint_key : f.name,
          hint_de: f.hint_de,
          hint_uk: f.hint_uk,
          hint_en: f.hint_en,
          hint_tr: f.hint_tr,
          hint_ar: f.hint_ar,
          hint_pl: f.hint_pl,
          options: f.options,
          visible_if: f.visible_if
        };
        fieldsWrap.appendChild(createInputFromSchema(norm));
      }
      card.appendChild(fieldsWrap);

      if (_isCollapsible) {
        // IIFE to capture correct _arrow and fieldsWrap references per section
        (function(_h, _body, _arr) {
          _h.addEventListener('click', function() {
            var _hidden = _body.classList.contains('collapsed');
            if (_hidden) {
              _body.classList.remove('collapsed');
              _arr.classList.add('open');
            } else {
              _body.classList.add('collapsed');
              _arr.classList.remove('open');
            }
          });
        })(head, fieldsWrap, _arrow);
      }

      // After people_count_section: inject "Add person" button
      if (sec.id === 'people_count_section') {
        var _addBtn = document.createElement('button');
        _addBtn.type = 'button';
        _addBtn.className = 'miniBtn';
        _addBtn.style.cssText = 'margin:8px 0 4px;width:100%;';
        var _curLang = (typeof lang !== 'undefined') ? lang : 'uk';
        if (_curLang === 'ua') _curLang = 'uk';
        _addBtn.textContent = _ADD_PERSON_LABEL[_curLang] || _ADD_PERSON_LABEL.en;
        _addBtn.addEventListener('click', function(){
          var _pcInp = inputs.get('people_count');
          var _cur = parseInt((_pcInp ? _pcInp.value : formData['people_count']) || '1', 10);
          if (isNaN(_cur)) _cur = 1;
          if (_cur >= 5) return;
          var _next = String(_cur + 1);
          if (_pcInp) { _pcInp.value = _next; }
          formData['people_count'] = _next;
          applyVisibleIf();
          updateSubmitState();
        });
        card.appendChild(_addBtn);
      }

      elMain.appendChild(card);
    }
    if (savedDataFromUrl) {
      Object.keys(savedDataFromUrl).forEach(function(key){
        var val = savedDataFromUrl[key];
        if (val !== null && val !== undefined && val !== '') {
          formData[key] = String(val).trim();
          var inp = inputs.get(key);
          if (inp) {
            // yesno: click the correct button to update state and visual
            if (inp.dataset && inp.dataset.type === 'yesno') {
              var _ynVal = String(val).trim().toLowerCase();
              var _ynBtn = inp.querySelector(_ynVal === 'ja' ? '.yn-ja' : '.yn-nein');
              if (_ynBtn) _ynBtn.click();
            } else {
              inp.value = String(val).trim();
            }
          }
        }
      });
    }
    // Post-build step for aufenthaltstitel: wrap child2/child3 fields in toggle blocks
    _postBuildAufenthaltstitel();
    applyVisibleIf();
    updateSubmitState();
    setTimeout(function(){ updateSubmitState(); if (typeof updatePreview === 'function') updatePreview(); }, 100);
    setTimeout(function(){ updateSubmitState(); }, 300);
  }

  // ── Aufenthaltstitel-specific post-render: child2 / child3 toggle blocks ──
  function _postBuildAufenthaltstitel() {
    if (docType !== 'aufenthaltstitel') return;
    var _L = lang || 'en';
    if (_L === 'ua') _L = 'uk';
    var _addLabels = {
      de: ['+ 2. Kind hinzufügen', '+ 3. Kind hinzufügen'],
      en: ['+ Add 2nd child', '+ Add 3rd child'],
      uk: ['+ Додати 2-гу дитину', '+ Додати 3-гу дитину'],
      pl: ['+ Dodaj 2. dziecko', '+ Dodaj 3. dziecko'],
      tr: ['+ 2. çocuk ekle', '+ 3. çocuk ekle'],
      ar: ['+ إضافة الطفل الثاني', '+ إضافة الطفل الثالث']
    };
    var _rmLabels = {
      de: ['− 2. Kind entfernen', '− 3. Kind entfernen'],
      en: ['− Remove 2nd child', '− Remove 3rd child'],
      uk: ['− Прибрати 2-гу дитину', '− Прибрати 3-гу дитину'],
      pl: ['− Usuń 2. dziecko', '− Usuń 3. dziecko'],
      tr: ['− 2. çocuğu kaldır', '− 3. çocuğu kaldır'],
      ar: ['− إزالة الطفل الثاني', '− إزالة الطفل الثالث']
    };
    var _prefixes = [['child2_', 0], ['child3_', 1]];
    for (var pi = 0; pi < _prefixes.length; pi++) {
      var prefix = _prefixes[pi][0];
      var idx    = _prefixes[pi][1];
      // Collect all .fg containers that belong to this child prefix
      var fgEls = [];
      var _allKeyed = document.querySelectorAll('[data-key]');
      for (var ai = 0; ai < _allKeyed.length; ai++) {
        var _dk = _allKeyed[ai].dataset.key || '';
        if (_dk.indexOf(prefix) === 0) {
          var el = _allKeyed[ai];
          // Walk up to the nearest .fg ancestor
          while (el && !(el.classList && el.classList.contains('fg'))) {
            el = el.parentElement;
          }
          if (el) {
            var _dup = false;
            for (var fi = 0; fi < fgEls.length; fi++) {
              if (fgEls[fi] === el) { _dup = true; break; }
            }
            if (!_dup) fgEls.push(el);
          }
        }
      }
      if (!fgEls.length) continue;
      var parent = fgEls[0].parentElement;
      if (!parent) continue;

      // Build collapsible block and move fg elements into it
      var block = mk('div', 'at-child-block');
      block.style.display = 'none';
      for (var bi = 0; bi < fgEls.length; bi++) { block.appendChild(fgEls[bi]); }

      var _addLbl = (_addLabels[_L] || _addLabels.en)[idx];
      var _rmLbl  = (_rmLabels[_L]  || _rmLabels.en)[idx];
      var toggle  = mk('div', 'at-child-toggle');
      toggle.innerHTML = '<span class="ct-ico">👶</span> <span class="ct-lbl">' + _addLbl + '</span>';

      parent.appendChild(toggle);
      parent.appendChild(block);

      // Auto-open if pre-fill data already has values for this child group
      var _hasPreFill = false;
      for (var ki in savedDataFromUrl) {
        if (savedDataFromUrl[ki] && ki.indexOf(prefix) === 0) { _hasPreFill = true; break; }
      }

      // Closure for click handling
      (function(_t, _b, _pref, _al, _rl) {
        function _openBlock() {
          _b.style.display = 'block';
          _t.classList.add('ct-open');
          _t.querySelector('.ct-lbl').textContent = _rl;
          _t.querySelector('.ct-ico').textContent = '✕';
        }
        function _closeBlock() {
          _b.style.display = 'none';
          _t.classList.remove('ct-open');
          _t.querySelector('.ct-lbl').textContent = _al;
          _t.querySelector('.ct-ico').textContent = '👶';
          // Clear data for this child group
          var _cels = document.querySelectorAll('[data-key]');
          for (var ci = 0; ci < _cels.length; ci++) {
            var _ck = _cels[ci].dataset.key || '';
            if (_ck.indexOf(_pref) === 0) {
              if (_cels[ci].tagName === 'INPUT' || _cels[ci].tagName === 'SELECT') {
                _cels[ci].value = '';
              }
              delete formData[_ck];
            }
          }
          updateSubmitState();
        }
        _t.addEventListener('click', function() {
          if (_b.style.display !== 'none') { _closeBlock(); } else { _openBlock(); }
        });
        if (_hasPreFill) { _openBlock(); }
      })(toggle, block, prefix, _addLbl, _rmLbl);
    }
  }

  function renderSection(sectionKey, fieldList){
    if (!fieldList.length) return null;

    const card = mk('div','card fadeIn');
    const head = mk('div','secHead');
    const name = mk('div','secName');
    name.appendChild(mk('div','ico', escapeHtml(secIcon(sectionKey))));
    name.appendChild(document.createTextNode(sectionName(sectionKey)));
    head.appendChild(name);

    // extra actions for child section
    if (sectionKey === 'child' && docCfg.child){
      const actions = mk('div','miniRow');
      const addBtn = mk('button','miniBtn', escapeHtml(t.add_child));
      addBtn.type = 'button';
      addBtn.addEventListener('click', ()=>{
        if (childCount >= (docCfg.child.max || 8)) return toastMsg('Max');
        childCount++;
        rebuild();
        toastMsg('+ child');
      });
      actions.appendChild(addBtn);
      head.appendChild(actions);
    }

    card.appendChild(head);

    const fieldsWrap = mk('div','fields');

    // layout: if two consecutive simple text fields in same section -> row2
    // minimal safe approach: keep 1 column, but make plz+city row2 when present
    const keys = fieldList.map(f=>f.key);
    const canRow2 = (a,b)=> keys.includes(a) && keys.includes(b);

    // For address: street+house_number row2, plz+city row2
    if (sectionKey === 'address'){
      const street = fieldList.find(f=>f.key==='street' || f.key==='old_street');
      const house = fieldList.find(f=>f.key==='house_number');
      const plz = fieldList.find(f=>f.key==='plz');
      const city = fieldList.find(f=>f.key==='city' || f.key==='old_city');

      if (street && house){
        const r = mk('div','row2');
        r.appendChild(createInput(street));
        r.appendChild(createInput(house));
        fieldsWrap.appendChild(r);
        fieldList = fieldList.filter(f=>f!==street && f!==house);
      }
      if (plz && city){
        const r2 = mk('div','row2');
        r2.appendChild(createInput(plz));
        r2.appendChild(createInput(city));
        fieldsWrap.appendChild(r2);
        fieldList = fieldList.filter(f=>f!==plz && f!==city);
      }
    }

    // Remaining fields normal
    fieldList.forEach(f=>{
      fieldsWrap.appendChild(createInput(f));
    });

    card.appendChild(fieldsWrap);

    // child blocks (dynamic)
    if (sectionKey === 'child' && docCfg.child && docCfg.childSchema){
      // remove anything already rendered for child (we render via schema below)
      card.querySelector('.fields').innerHTML = '';

      for (let i=1;i<=childCount;i++){
        const childCard = mk('div','card');
        childCard.style.background = 'var(--card2)';
        childCard.style.border = '1px solid var(--line)';
        childCard.style.borderRadius = 'var(--radius)';
        childCard.style.boxShadow = 'none';
        childCard.style.padding = '14px';

        const top = mk('div','secHead');
        const left = mk('div','secName');
        left.appendChild(mk('div','ico', '👶'));
        left.appendChild(document.createTextNode(sectionName('child') + ' #' + i));
        top.appendChild(left);

        const del = mk('button','miniBtn', escapeHtml(t.remove_child));
        del.type = 'button';
        del.addEventListener('click', ()=>{
          if (childCount <= (docCfg.child.min || 1)) return;
          // shift data down for removed index
          for (let j=i; j<childCount; j++){
            const fromName = `child_${j+1}_name`;
            const fromDob = `child_${j+1}_birthday`;
            const toName = `child_${j}_name`;
            const toDob = `child_${j}_birthday`;
            if (formData[fromName]) formData[toName] = formData[fromName]; else delete formData[toName];
            if (formData[fromDob]) formData[toDob] = formData[fromDob]; else delete formData[toDob];
          }
          delete formData[`child_${childCount}_name`];
          delete formData[`child_${childCount}_birthday`];
          childCount--;
          rebuild();
        });

        top.appendChild(mk('div','miniRow',''));
        top.lastChild.appendChild(del);

        childCard.appendChild(top);

        const fw = mk('div','fields');

        docCfg.childSchema.forEach(baseField=>{
          const actualKey = `child_${i}_${baseField.key.split('child_').pop()}`;
          // label & placeholder from base keys
          const field = {
            key: baseField.key,
            type: baseField.type,
            section: 'child',
            required: baseField.required
          };
          const fg = createInput(field, actualKey);
          // tweak label to use base key translation
          const lbl = fg.querySelector('.lbl');
          if (lbl){
            lbl.childNodes.forEach(n=>{
              if (n.nodeType === 3) n.textContent = (t.labels[baseField.key] || baseField.key.replace(/_/g,' '));
            });
          }
          fw.appendChild(fg);

          // restore value - priority: saved_data from URL > formData
          const inp = inputs.get(actualKey);
          if (inp) {
            if (savedDataFromUrl && savedDataFromUrl[actualKey]) {
              inp.value = String(savedDataFromUrl[actualKey]).trim();
              formData[actualKey] = String(savedDataFromUrl[actualKey]).trim();
            } else if (formData[actualKey]) {
              inp.value = formData[actualKey];
            }
          }
        });

        childCard.appendChild(fw);
        card.querySelector('.fields').appendChild(childCard);
      }
    }

    return card;
  }

  /* ===================== VALIDATION (GLOBAL) ===================== */
  function validateAll(){
    // Validate all fields and show errors
    return isFormValid(true);
  }

  function requiredKeysGuard(){
    // Only visible required fields block submit — read actual DOM values (not stale formData).
    // yesno fields are divs (no .value); read their ynval dataset attribute or formData.
    var visibleRequired = getRequiredFieldsVisible();
    for (var key of visibleRequired) {
      var _ginp = inputs.get(key);
      var _gv;
      if (_ginp && (_ginp.dataset.type === 'yesno' || (_ginp.tagName === 'DIV'))) {
        _gv = (_ginp.dataset.ynval || formData[key] || '').trim();
      } else if (_ginp && (_ginp.type === 'checkbox' || _ginp.dataset.type === 'checkbox')) {
        // Checkboxes: .value is always the static attribute ('on'); use .checked for state
        _gv = _ginp.checked ? 'checked' : '';
      } else {
        _gv = _ginp ? (_ginp.value || '').trim() : (formData[key] || '').trim();
      }
      if (!_gv) {
        console.warn('[requiredKeysGuard] BLOCKING field:', key, '| value:', _gv, '| inp:', _ginp ? _ginp.tagName : 'null');
        return false;
      }
    }
    return true;
  }

  /* ===================== PREVIEW (IN-FORM) ===================== */
  function hasPreviewData(){
    var flat = (formSchema && formSchema.sections) ? getFlatFieldsFromSchema() : [];
    if (flat.length) {
      for (var i = 0; i < flat.length; i++) {
        var v = getFieldValue(flat[i].key);
        if (v && v !== '' && v !== null && v !== undefined) return true;
      }
      return false;
    }
    var hasData = false;
    (docCfg.fields || []).forEach(f => {
      const v = getFieldValue(f.key);
      if (v && v !== '' && v !== null && v !== undefined) hasData = true;
    });
    if (docCfg.child && docCfg.childSchema) {
      for (let i = 1; i <= childCount; i++) {
        const nameValue = getFieldValue('child_'+i+'_name');
        const dobValue = getFieldValue('child_'+i+'_birthday');
        if ((nameValue && nameValue !== '') || (dobValue && dobValue !== '')) hasData = true;
      }
    }
    if (landParam || getFieldValue('land')) hasData = true;
    return hasData;
  }

  function updatePreview(){
    // Replaced: no duplicate data-check block — PDF preview handles verification.
    // Show a single localized hint line only when form has data.
    if (!hasPreviewData()) {
      elPreview.style.display = 'none';
      return;
    }
    elPreview.style.display = 'block';
    elPreview.innerHTML = '';
    var hint = mk('div', 'help');
    hint.style.textAlign = 'center';
    hint.style.padding = '12px 16px';
    hint.style.color = 'var(--muted)';
    hint.style.fontSize = '13px';
    hint.textContent = t.preview_hint || 'Your data will be checked in the PDF preview after submission';
    elPreview.appendChild(hint);
  }

  /* ===================== REVIEW ===================== */
  // Universal helper to get field value - CRITICAL FIX: Priority order
  // Priority: live DOM inputs > user_answers (from payload) > formData (fallback)
  function getFieldValue(key){
    let domValue = null;
    let userAnswersValue = user_answers[key];
    let formDataValue = formData[key];
    let finalValue = null;
    
    // Step 1: Try live DOM inputs first (most reliable - current state)
    const inp = inputs.get(key);
    if (inp && inp.value !== undefined && inp.value !== null && inp.value !== '') {
      domValue = inp.value.toString().trim();
    }
    
    // Step 2: Try to find by name attribute in DOM (if not found in Map)
    if (!domValue) {
      try {
        const byName = document.querySelector(`input[name="${key}"], textarea[name="${key}"], select[name="${key}"]`);
        if (byName && byName.value !== undefined && byName.value !== null && byName.value !== '') {
          domValue = byName.value.toString().trim();
        }
      } catch(e) {
        // Ignore querySelector errors
      }
    }
    
    // Step 3: Try to find by dataset.key attribute (fallback)
    if (!domValue) {
      try {
        const byDataset = document.querySelector(`[data-key="${key}"]`);
        if (byDataset && byDataset.value !== undefined && byDataset.value !== null && byDataset.value !== '') {
          domValue = byDataset.value.toString().trim();
        }
      } catch(e) {
        // Ignore querySelector errors
      }
    }
    
    // Step 4: Use DOM value if found, otherwise try user_answers, then formData
    if (domValue !== null && domValue !== '') {
      finalValue = domValue;
    } else if (userAnswersValue !== undefined && userAnswersValue !== null && userAnswersValue !== '') {
      finalValue = String(userAnswersValue).trim();
      console.log(`👁️ Preview getFieldValue(${key}): Using user_answers: "${finalValue}"`);
    } else if (formDataValue !== undefined && formDataValue !== null && formDataValue !== '') {
      finalValue = String(formDataValue).trim();
      console.log(`👁️ Preview getFieldValue(${key}): Using formData: "${finalValue}"`);
    } else {
      finalValue = '';
      console.log(`👁️ Preview getFieldValue(${key}): No value found`);
    }
    
    // Debug logging (DO NOT REMOVE)
    console.log("[REVIEW]", key, {
      domValue: domValue,
      userAnswersValue: userAnswersValue,
      formDataValue: formDataValue,
      finalValue: finalValue,
      foundInMap: !!inp
    });
    
    return finalValue;
  }

  // buildReview() removed: duplicate data-check step eliminated.
  // PDF preview sent by bot serves as the data verification screen.

  /* ===================== BUILD MAIN ===================== */
  function renderLangRow(){
    const langs = ['uk','de','pl','tr','en','ar'];
    const row = document.getElementById('langRow');
    row.innerHTML = '';

    langs.forEach(code=>{
      const c = mk('div','chip', code.toUpperCase());
      if (code === lang) c.classList.add('active');
      c.addEventListener('click', ()=>{
        const p = new URLSearchParams(location.search);
        p.set('lang', code);
        history.replaceState(null, '', (location.pathname || '') + '?' + p.toString());
        lang = code;
        if (lang === 'ua') lang = 'uk';
        if (['de','en','uk','tr','ar','pl'].indexOf(lang) === -1) lang = 'uk';
        document.documentElement.lang = lang;
        if (lang === 'ar') document.body.setAttribute('dir','rtl');
        else document.body.removeAttribute('dir');
        const tNew = mergeLang(T[lang] || T.uk, lang);
        Object.assign(t, tNew);
        if (formSchema && formSchema.sections && formSchema.sections.length) {
          rebuildFromSchema();
        } else {
          rebuild();
        }
        renderLangRow();
      });
      row.appendChild(c);
    });
  }

  function rebuild(){
    elMain.innerHTML = '';
    inputs.clear();

    // titles
    elTitle.textContent = t.title;
    elSubtitle.textContent = t.subtitle;
    document.getElementById('btnSubmit').textContent = (t.submit_btn_disabled != null && t.submit_btn_disabled !== '') ? t.submit_btn_disabled : (t.submit_btn || T.uk.submit_btn || T.uk.submit);
    document.getElementById('okTitle').textContent = t.done_title;
    document.getElementById('okText').textContent = t.done_text;
    pillDocVal.textContent = docType;

    renderLangRow();

    // if doc requires land field (optional): add it only if doc config wants it
    // Here: if URL has land OR doc has section 'land' in docCfg.sections => show selector.
    const useLand = !!landParam || (docCfg.sections || []).includes('land');

    // group fields by section
    const secMap = {};
    (docCfg.fields || []).forEach(f=>{
      if (!secMap[f.section]) secMap[f.section] = [];
      secMap[f.section].push(f);
    });

    // inject land selector if requested
    if (useLand){
      if (!secMap.land) secMap.land = [];
      // only one land input
      if (!secMap.land.some(x=>x.key==='land')){
        secMap.land.unshift({key:'land',type:'land',section:'land',required:true});
      }
    }

    // ensure child section is present for kindergeld
    if (docCfg.child && !secMap.child) secMap.child = [{key:'child',type:'text',section:'child',required:false}];

    // render in order
    SECTION_ORDER.forEach(sk=>{
      const fields = secMap[sk] ? [...secMap[sk]] : [];
      if (!fields.length) return;

      // special: child section handled by schema, not by placeholder
      if (sk === 'child' && docCfg.child){
        const card = renderSection('child', [{key:'child',type:'text',section:'child',required:false}]);
        if (card) elMain.appendChild(card);
        return;
      }

      const card = renderSection(sk, fields);
      if (card) elMain.appendChild(card);
    });

    // restore values - priority: saved_data from URL > formData > landParam
    inputs.forEach((inp,key)=>{
      // Priority 1: Use saved_data from URL if available (when reopening form)
      if (savedDataFromUrl && savedDataFromUrl[key]) {
        inp.value = String(savedDataFromUrl[key]).trim();
        formData[key] = String(savedDataFromUrl[key]).trim();
      }
      // Priority 2: Use formData (from previous session)
      else if (formData[key]) {
        inp.value = formData[key];
      }
      // Priority 3: Use landParam from URL
      if (key === 'land' && landParam){
        inp.value = landParam;
        inp.disabled = true;
        formData[key] = landParam;
      }
    });
    
    // Also restore saved_data to formData for all fields (not just inputs that exist)
    if (savedDataFromUrl) {
      Object.keys(savedDataFromUrl).forEach(key => {
        const value = savedDataFromUrl[key];
        if (value !== null && value !== undefined && value !== '') {
          formData[key] = String(value).trim();
          // Also set input value if input exists
          const inp = inputs.get(key);
          if (inp) {
            inp.value = String(value).trim();
          }
        }
      });
      console.log('✅ Pre-filled form with saved data:', Object.keys(savedDataFromUrl).length, 'fields');
    }

    // if URL forces land into payload
    if (landParam) formData.land = landParam;
    
    // Initialize buttons state (disabled by default)
    if (btnSubmit) btnSubmit.disabled = true;
    
    // Update state after a short delay to ensure all inputs are registered
    // This delay allows saved_data to be processed and inputs to be restored
    setTimeout(() => {
      updateSubmitState();
      // TASK 3: FIX PREVIEW INSIDE FORM - Ensure preview shows user-entered values
      // Preview MUST display user-entered values (TASK 3 requirement)
      updatePreview();
      // Log if saved data was restored
      if (savedDataFromUrl) {
        console.log('✅ Form restored with saved data, preview updated');
      }
      // Force preview update after a short delay to ensure all inputs are ready
      // This ensures preview is always up-to-date with current form values
      setTimeout(() => {
        updatePreview();
        console.log('👁️ Preview: Force update after rebuild - showing current input values');
        // TASK 3: Make preview visible if there's data
        if (hasPreviewData()) {
          elPreview.style.display = 'block';
          console.log('👁️ Preview: Made visible because data exists');
        }
      }, 100);
    }, 150);
  }

  /* ===================== ACTIONS ===================== */
  // Review step removed: PDF preview handles data verification.
  // goToReview() and goBack() are no longer used.

  function submit(){
    var submitBtnEl = document.getElementById('btnSubmit');
    console.log('[submit] called');
    // ── Sync formData from actual DOM values — eliminates any stale state ──
    inputs.forEach(function(_si, _sk) {
      if (_si && _si.dataset && _si.dataset.type === 'yesno') {
        // yesno: value already lives in formData; do not overwrite with undefined
        return;
      }
      if (_si && _si.value !== undefined) {
        var _sv = (_si.value || '').trim();
        formData[_sk] = _sv;
      }
    });
    // Ensure conditional-required state (dataset.required) is fresh before any validation
    applyVisibleIf();
    if (!isFormValid(true)) {
      var _mInputDbg = inputs.get('eheschliessung_ort_datum');
      var _mValueDbg = _mInputDbg ? (_mInputDbg.value || '').trim() : '';
      var _mParsedDbg = parseMarriagePlaceDate(_mValueDbg);
      console.log('VALUE:', _mValueDbg);
      console.log('VALID:', _mParsedDbg.valid);
      console.log('BLOCK REASON:', _mParsedDbg.reason || 'blocked_by_other_field');
      var missingLabels = typeof getMissingRequiredLabels === 'function' ? getMissingRequiredLabels() : [];
      var alertEl = document.getElementById('missingFieldsAlert');
      var titleEl = document.getElementById('missingFieldsTitle');
      var listEl = document.getElementById('missingFieldsList');
      if (alertEl && titleEl && listEl) {
        var titleText = 'Please fill all required fields:';
        if (typeof lang !== 'undefined' && lang === 'de') titleText = 'Bitte füllen Sie alle Pflichtfelder aus:';
        else if (typeof lang !== 'undefined' && (lang === 'uk' || lang === 'ua')) titleText = 'Заповніть усі обовʼязкові поля:';
        else if (t.missing_fields_title) titleText = t.missing_fields_title;
        titleEl.textContent = titleText;
        listEl.innerHTML = missingLabels.map(function(l){ return '<li>' + escapeHtml(l) + '</li>'; }).join('');
        alertEl.style.display = 'block';
        alertEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      toastMsg(t.err_fix || 'Fix form errors');
      // Scroll to first invalid field for immediate fix
      if (typeof scrollToFirstInvalidField === 'function') scrollToFirstInvalidField();
      console.log('[submit] blocked: isFormValid false');
      return;
    }
    var alertEl = document.getElementById('missingFieldsAlert');
    if (alertEl) alertEl.style.display = 'none';
    var answers = {};
    inputs.forEach(function(inp, key) {
      // ── yesno: value lives in formData, not in inp.value ──
      if (inp && inp.dataset && inp.dataset.type === 'yesno') {
        // Always include yesno fields regardless of visibility (they control PDF checkboxes)
        var _yn = (formData[key] || 'nein').trim();
        answers[key] = _yn;
        formData[key] = _yn;
        return;
      }
      // ── Skip hidden conditional fields — avoids stale data in PDF ──
      if (!isFieldVisible(inp) && !isHiddenOnlyByCollapsedSection(inp)) {
        delete formData[key]; // also purge from formData to keep state clean
        return;
      }
      if (inp && inp.value !== undefined) {
        var v = inp.value.toString().trim();
        // Normalize phone: strip leading + and spaces so backend receives plain digits
        if (key === 'phone' && v) {
          v = v.replace(/^\+/, '').replace(/[\s\-]/g, '');
        }
        answers[key] = v;
        formData[key] = v;
      }
    });
    // ── HARD GATE: final independent check before data leaves the form ──
    // Reads actual DOM values for ALL visible required fields (incl. conditional).
    // If any are empty, block sendData, show inline error, scroll.
    var _hgFail = false;
    var _hgReq = getRequiredFieldsVisible();
    for (var _hk of _hgReq) {
      var _hinp = inputs.get(_hk);
      if (_hinp && _hinp.dataset && _hinp.dataset.type === 'yesno') {
        if (_hinp.dataset.required === '1') {
          var _hy = (_hinp.dataset.ynval || formData[_hk] || '').trim();
          if (_hy !== 'ja') {
            _hgFail = true;
            validateField(_hinp, true);
          }
        }
        continue;
      }
      if (!_hinp || !(_hinp.value || '').trim()) {
        _hgFail = true;
        if (_hinp) validateField(_hinp, true);
      }
    }
    // Independent DOM-only conditional check — zero trust in formData / getRequiredFieldsVisible.
    var _famDom = inputs.get('familienstand');
    var _famDomV = _famDom ? (_famDom.value || '').trim().toLowerCase() : '';
    if (_famDomV === 'verheiratet' || _famDomV === 'eingetragene lebenspartnerschaft') {
      var _eDom = inputs.get('eheschliessung_ort_datum');
      if (_eDom && isFieldVisible(_eDom) && !(_eDom.value || '').trim()) {
        _hgFail = true;
        validateField(_eDom, true);
      }
    }
    if (_hgFail) {
      toastMsg(t.err_fix || 'Fix form errors');
      scrollToFirstInvalidField();
      console.log('[submit] HARD GATE blocked: required field empty after final DOM check');
      return;
    }
    // ── END VALIDATION GATES ──
    // Email double-protection: explicit guard even if button was somehow enabled
    // (defense-in-depth — server also validates, but this blocks bad UX paths)
    var _egInp = inputs.get('email');
    if (_egInp) {
      var _egVal = (_egInp.value || '').trim();
      // Email is optional: only block if the user typed something that is NOT a valid address.
      // Empty email = OK, we skip the guard entirely.
      if (_egVal && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(_egVal)) {
        validateField(_egInp, true);
        toastMsg(t.err_email || '❌ Enter a valid email');
        _egInp.scrollIntoView({ behavior: 'smooth', block: 'center' });
        console.log('[submit] BLOCKED: invalid email format');
        return;
      }
    }
    // Note: isFormValid(true) already ran at the top of submit() and validated
    // all date formats (DD.MM.YYYY), PLZ, names, etc. HARD GATE above is a
    // defense-in-depth for empty required fields. Server also validates.
    var urlParams = new URLSearchParams(location.search);
    var currentLang = (urlParams.get('lang') || (document.documentElement && document.documentElement.lang) || lang || 'uk').trim();
    if (currentLang === 'ua') currentLang = 'uk';
    if (!currentLang) currentLang = 'uk';
    var api = (typeof window !== 'undefined' && window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : tg;
    var chatId = (urlParams.get('chat_id') || '').trim();
    if (!chatId && typeof chatIdFromUrl !== 'undefined' && chatIdFromUrl != null && String(chatIdFromUrl).trim()) {
      chatId = String(chatIdFromUrl).trim();
    }
    if (!chatId && api && api.initDataUnsafe && api.initDataUnsafe.user && api.initDataUnsafe.user.id != null) {
      chatId = String(api.initDataUnsafe.user.id);
    }
    if (!chatId) {
      var _noChat = 'Could not detect your Telegram chat. Open this form from the bot again.';
      if (typeof lang !== 'undefined') {
        if (lang === 'uk' || lang === 'ua') _noChat = 'Не вдалося визначити чат. Відкрийте форму з меню бота.';
        if (lang === 'de') _noChat = 'Chat nicht erkannt. Bitte Formular über den Bot öffnen.';
        if (lang === 'pl') _noChat = 'Nie wykryto czatu. Otwórz formularz z bota.';
        if (lang === 'tr') _noChat = 'Sohbet algılanamadı. Formu bottan açın.';
        if (lang === 'ar') _noChat = 'تعذر التعرف على المحادثة. افتح النموذج من البوت.';
      }
      toastMsg(_noChat);
      console.log('[submit] blocked: no chat_id');
      return;
    }
    // UX: явний стан «готуємо приклад документа»
    var submitBtn = document.getElementById('btnSubmit');
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.textContent = (t.preparing_doc || 'Preparing…');
    }
    if (elSubtitle) elSubtitle.textContent = (t.preparing_doc || 'Preparing document…');
    // Debug: verify gender fields reach payload
    console.log('[PAYLOAD_GENDER] gender="' + (answers['gender'] || '') + '" person2_gender="' + (answers['person2_gender'] || '') + '"');
    // Send form data via Telegram WebApp API (sendData → bot WEB_APP_DATA handler)
    // NEW SUBMIT FLOW через backend
fetch('/webapp-submit', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    chat_id: chatId,
    doc_type: docType,
    user_answers: answers,
    lang: currentLang
  })
})
.then(function(res) {
  if (!res.ok && res.status >= 500) {
    throw new Error('Server error ' + res.status);
  }
  return res.json();
})
.then(function(data) {
  console.log('Backend response:', data);

  // SUCCESS
  if (data && (data.ok === true || data.status === 'ok')) {
    var successMessage = (data && data.message) || 'PDF ready. Proceed to payment';
    toastMsg(successMessage);
    // Keep UX visible for a short moment, then close WebApp.
    setTimeout(function() {
      if (api && api.close) { api.close(); }
    }, 1200);
    return;
  }

  // VALIDATION ERROR — server returned validation errors
  if (data && data.validation) {
    // Strip "valid" green from all inputs
    inputs.forEach(function(inp) { inp.classList.remove('valid'); });

    // Highlight each failing field, show message under it, collect for banner list
    var errorList = [];
    if (data.field_errors) {
      Object.keys(data.field_errors).forEach(function(name) {
        var input = inputs.get(name) || document.querySelector('[name="' + name + '"]');
        if (!input) return;

        input.classList.remove('valid');
        input.classList.add('error');

        var msg = data.field_errors[name] || '';
        if (msg) errorList.push(msg);

        var fg = input.closest('.fg') || input.parentElement;
        if (fg) {
          var err = fg.querySelector('.err');
          if (err) {
            err.textContent = msg;
            err.classList.add('show');
          }
        }
      });
    }

    // Show global banner with bullet list of problems
    var banner = document.getElementById('validationBanner');
    if (banner) {
      var bannerHeader = '\u26A0 ' + ((t && t.err_banner_validation) || 'Please correct the highlighted fields');
      banner.textContent = errorList.length
        ? bannerHeader + '\n\n\u2022 ' + errorList.join('\n\u2022 ')
        : bannerHeader;
      banner.classList.add('show');
    }

    // Scroll to first red field
    var first = document.querySelector('.in.error');
    if (first) {
      setTimeout(function() {
        first.scrollIntoView({ behavior: 'smooth', block: 'center' });
        first.focus();
      }, 150);
    }

    // Re-enable submit button
    var sb = document.getElementById('btnSubmit');
    if (sb) {
      sb.disabled = false;
      sb.textContent = (t && t.submit_btn_enabled) || (t && t.submit_btn) || 'Submit';
    }
    return;
  }

  // OTHER error
  throw new Error((data && data.error) || 'Invalid backend response');
})
.catch(function(err) {
  console.error('Submit error:', err);
  toastMsg((err && err.message && err.message !== 'Invalid backend response')
    ? err.message
    : ((t && t.submit_error) || 'Failed to submit. Please try again.'));
})
.finally(function() {
  // Always reset loading state regardless of success/failure
  var sbFinal = document.getElementById('btnSubmit');
  if (sbFinal && sbFinal.disabled && !(sbFinal.textContent === (t && t.preparing_doc))) {
    // Button was already re-enabled in success/error paths; only reset if still stuck
  }
  if (sbFinal && sbFinal.disabled) {
    // If we reach finally with button still disabled (e.g. success closed the webapp),
    // reset it as a safety net for cases where api.close() didn't fire.
    sbFinal.disabled = false;
    if (t && t.submit_btn) sbFinal.textContent = t.submit_btn;
  }
  if (elSubtitle && elSubtitle.textContent === (t && t.preparing_doc)) {
    elSubtitle.textContent = '';
  }
});
}

  /* ===================== INIT ===================== */
  var btnSubmitInit = document.getElementById('btnSubmit');
  if (btnSubmitInit) btnSubmitInit.addEventListener('click', submit);

  document.body.addEventListener('input', function(e){
    if (e.target && (e.target.matches('input') || e.target.matches('select'))) {
      // Hide validation banner once user starts correcting
      var _vb = document.getElementById('validationBanner');
      if (_vb) _vb.classList.remove('show');
      if (typeof applyVisibleIf === 'function') applyVisibleIf();
      if (typeof updateSubmitState === 'function') updateSubmitState();
    }
  });
  document.body.addEventListener('change', function(e){
    if (e.target && (e.target.matches('input') || e.target.matches('select'))) {
      // Hide validation banner once user starts correcting
      var _vb = document.getElementById('validationBanner');
      if (_vb) _vb.classList.remove('show');
      if (typeof applyVisibleIf === 'function') applyVisibleIf();
      if (typeof updateSubmitState === 'function') updateSubmitState();
    }
  });

  if (!tg){
    toastMsg('Telegram WebApp not detected (browser preview)');
  }

  
const elFlowHint = document.getElementById('flowHint');
  const elStepPill = document.getElementById('stepPill');
  const elDisclaimer = document.getElementById('disclaimerBlock');

  async function init(){
    console.log('[init] starting | docType:', docType, '| lang:', lang, '| origin:', location.origin, '| href:', location.href);
    elTitle.textContent = t.title;
    elSubtitle.textContent = t.subtitle;
    pillDocVal.textContent = docType;
    if (elFlowHint) elFlowHint.textContent = t.flow_hint || '';
    if (elStepPill) {
      var stepText = t.step_form || 'Step 1 of 4: Form';
      if (t.step_time_estimate) stepText += ' • ' + t.step_time_estimate;
      elStepPill.textContent = stepText;
    }
    if (elDisclaimer) elDisclaimer.textContent = (t.disclaimer || '');
    renderLangRow();
    var schema = await loadFormSchema();
    if (!schema || !schema.sections || !schema.sections.length) {
      var detail = schema ? ('sections: ' + JSON.stringify(schema.sections || null)) : 'schema is null (fetch failed or empty response)';
      showComingSoon(detail);
      return;
    }
    console.log('[init] schema loaded OK | sections:', schema.sections.length, '| total fields:', schema.sections.reduce(function(a,s){ return a + (s.fields||[]).length; }, 0));
    formSchema = schema;
    try {
      rebuildFromSchema();
    } catch (renderErr) {
      console.error('[init] rebuildFromSchema crashed for doc_type:', docType, '| error:', renderErr);
      showComingSoon('Render error: ' + (renderErr && renderErr.message ? renderErr.message : String(renderErr)));
    }
  }
  init();

})();
</script>
